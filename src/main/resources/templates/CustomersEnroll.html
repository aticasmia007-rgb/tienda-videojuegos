<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Guerrero | La Leyenda del Juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; background-color: #0d0d0d; color: white; font-family: 'Roboto', sans-serif; overflow: hidden; }
        .split-container { display: flex; height: 100vh; }
        .form-side { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .image-side { 
            flex: 1; 
            background: url('https://images.unsplash.com/photo-1760114333167-7f254ca9f3c4?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center center / cover no-repeat;
            border-left: 4px solid #bc13fe;
        }
        .retro-title { font-family: 'Press Start 2P', cursive; color: #bc13fe; font-size: 1.5rem; margin-bottom: 30px; text-transform: uppercase; }
        .form-control { 
            background: #9ac2d9; border: 2px solid #333; color: white; border-radius: 0; padding: 12px; margin-bottom: 20px;
        }
        .form-control:focus { background: #222; border-color: #bc13fe; color: white; box-shadow: 0 0 10px rgba(188, 19, 254, 0.5); }
        .btn-add { 
            font-family: 'Press Start 2P', cursive; background: #bc13fe; border: none; color: white; padding: 15px; width: 100%; transition: 0.3s;
        }
        .btn-add:hover { background: #00ff41; color: black; transform: scale(1.02); }
        label { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: #888; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="form-side">
            <h1 class="retro-title">Nuevo Cliente</h1>
            <form th:action="@{/altaClientes}" th:object="${customer}" method="post">
                <label>NOMBRE</label>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Andrea" required>
                
                <label>PRIMER APELLIDO</label>
                <input type="text" th:field="*{apellido1}" class="form-control" placeholder="Ej: Mateo" required>
                
                <label>SEGUNDO APELLIDO</label>
                <input type="text" th:field="*{apellido2}" class="form-control" placeholder="Ej: García de Vinuesa">
                
                <label>CORREO ELECTRÓNICO</label>
                <input type="email" th:field="*{correo}" class="form-control" placeholder="guerrero@mail.com" required>
                
                <button type="submit" class="btn-add mt-4">REGISTRAR CLIENTE</button>
                <div class="text-center mt-3">
                    <a th:href="@{/inicio}" class="text-muted small text-decoration-none">CANCELAR</a>
                </div>
            </form>
        </div>
        <div class="image-side d-none d-md-block"></div>
    </div>
</body>
</html>
