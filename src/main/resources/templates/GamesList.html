<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario de Juegos | La Leyenda del Juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Roboto', sans-serif;
            padding: 50px 0;
        }

        .game-title-page {
            font-family: 'Press Start 2P', cursive;
            color: #00ff41;
            text-shadow: 3px 3px 0px #bc13fe;
            font-size: 1.8rem;
            text-align: center;
        }

        /* Card estilo terminal/neon */
        .card-game {
            background: #1a1a1a;
            border: 2px solid;
            border-radius: 0;
            transition: all 0.3s ease;
            height: 100%;
        }

        .card-game:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Variaciones de colores para diferenciar */
        .border-neon-green { border-color: #00ff41 !important; box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.2); }
        .border-neon-purple { border-color: #bc13fe !important; box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2); }
        .border-neon-blue { border-color: #00d4ff !important; box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2); }

        .label-retro {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            display: block;
            margin-bottom: 5px;
            color: #888;
        }

        .game-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .price-box {
            background: #000;
            padding: 10px;
            border: 1px solid #333;
            color: #00ff41;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            text-align: center;
        }

        /* Estilo para los botones de navegación */
        .btn-back {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #bc13fe;
            text-decoration: none;
            border: 2px solid #bc13fe;
            padding: 10px 20px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-back:hover {
            background: #bc13fe;
            color: white;
        }

        .btn-action {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #00ff41;
            text-decoration: none;
            border: 2px solid #00ff41;
            padding: 10px 20px;
            transition: 0.3s;
            display: inline-block;
            margin-right: 10px;
        }

        .btn-action:hover {
            background: #00ff41;
            color: black;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="game-title-page mb-0">Listado de Juegos</h1>
        <div>
            <a th:href="@{/altaJuegos}" class="btn-action">AÑADIR JUEGO</a>
            <a th:href="@{/inicio}" class="btn-back">VOLVER</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4 col-lg-3" th:each="juego, iterStat : ${listaJuegos}">
            <div class="card card-game p-4" 
                 th:classappend="${iterStat.index % 3 == 0 ? 'border-neon-green' : (iterStat.index % 3 == 1 ? 'border-neon-purple' : 'border-neon-blue')}">
                
                <span class="label-retro">TITULO:</span>
                <h2 class="game-name" th:text="${juego.titulo}">TITULO</h2>

                <span class="label-retro">CATEGORIA:</span>
                <p class="mb-3 text-info" th:text="${juego.genero}">GENERO</p>

                <span class="label-retro">SISTEMA:</span>
                <p class="small text-muted" th:text="${juego.plataforma}">PLATAFORMA</p>

                <div class="mt-auto">
                    <div class="row g-0 align-items-center">
                        <div class="col-7">
                            <span class="label-retro">STOCK:</span>
                            <span th:text="${juego.stock}" th:class="${juego.stock < 20 ? 'text-danger' : 'text-success'}">0</span>
                        </div>
                        <div class="col-5">
                            <div class="price-box" th:text="${juego.precio + '€'}">0€</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
