<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Base de Datos Clientes | La Leyenda del Juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Roboto', sans-serif;
            padding: 50px 0;
        }

        .admin-title-page {
            font-family: 'Press Start 2P', cursive;
            color: #bc13fe; /* Morado Neón */
            text-shadow: 3px 3px 0px #000;
            font-size: 1.8rem;
            text-align: center;
            text-transform: uppercase;
        }

        /* Card alargada tipo fila */
        .customer-row-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: 5px solid #bc13fe; /* Acento morado */
            border-radius: 0;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .customer-row-card:hover {
            background: #222;
            border-left-color: #00ff41; /* Cambia a verde al pasar el ratón */
            transform: translateX(10px);
        }

        .label-retro {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            color: #888;
            display: block;
            margin-bottom: 2px;
        }

        .info-text {
            font-size: 1.1rem;
            font-weight: 400;
            color: #9ac2d9;
        }

        .email-text {
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* BOTONES */
        .btn-back {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #bc13fe; /* Morado para el volver */
            text-decoration: none;
            border: 2px solid #bc13fe;
            padding: 10px 20px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-back:hover {
            background: #bc13fe;
            color: white;
        }

        .btn-action {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: #00ff41; /* Verde para añadir */
            text-decoration: none;
            border: 2px solid #00ff41;
            padding: 10px 20px;
            transition: 0.3s;
            display: inline-block;
            margin-right: 10px;
        }

        .btn-action:hover {
            background: #00ff41;
            color: black;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="admin-title-page mb-0">Registro de Clientes</h1>
        <div>
            <a th:href="@{/altaClientes}" class="btn-action">AÑADIR CLIENTE</a>
            <a th:href="@{/inicio}" class="btn-back">VOLVER</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div class="card customer-row-card p-3" th:each="cliente : ${listaClientes}">
                <div class="row align-items-center text-center text-md-start">
                    
                    <div class="col-md-3">
                        <span class="label-retro">NOMBRE:</span>
                        <span class="info-text" th:text="${cliente.nombre}">Nombre</span>
                    </div>

                    <div class="col-md-5">
                        <span class="label-retro">APELLIDOS:</span>
                        <span class="info-text" th:text="${cliente.apellido1 + ' ' + (cliente.apellido2 != null ? cliente.apellido2 : '')}">Apellidos Completos</span>
                    </div>

                    <div class="col-md-4">
                        <span class="label-retro">CONTACTO:</span>
                        <span class="email-text" th:text="${cliente.correo}">email@ejemplo.com</span>
                    </div>

                </div>
            </div>

            <div th:if="${#lists.isEmpty(listaClientes)}" class="text-center p-5">
                <p class="label-retro" style="font-size: 1rem;">NO HAY CLIENTES REGISTRADOS</p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
