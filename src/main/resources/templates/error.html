<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ERROR - Sistema Interrumpido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: #ff003c; /* Rojo neón/error */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            border: 4px double #ff003c;
            padding: 50px;
            background: rgba(255, 0, 60, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
            max-width: 800px;
        }

        .glitch-code {
            font-size: 5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px #bc13fe;
            animation: pulse 1.5s infinite;
        }

        .message {
            font-size: 1rem;
            line-height: 2;
            margin-bottom: 30px;
            color: #fff;
        }

        .btn-retry {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            color: #00ff41; /* Verde neón */
            border: 2px solid #00ff41;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-retry:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 15px #00ff41;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="error-container">
        <div class="glitch-code">404/500</div>
        <h1 style="font-size: 1.2rem; margin-bottom: 20px;">CRITICAL_SYSTEM_FAILURE</h1>
        <div class="message">
            PARECE QUE EL GUERRERO SE HA PERDIDO EN LA MAZMORRA.<br>
            LA PÁGINA QUE BUSCAS HA SIDO ELIMINADA POR UN BOSS.
        </div>
        <a th:href="@{/inicio}" class="btn-retry">REINTENTAR NIVEL (INICIO)</a>
    </div>
</body>
</html>
